<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Portfolio | Local Files</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #f59e0b; 
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        nav {
            display: flex;
            justify-content: space-between;
            padding: 1.5rem 5%;
            position: fixed;
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid #334155;
        }

        nav a { color: var(--text); text-decoration: none; font-weight: 500; }

        .section { padding: 8rem 10% 5rem 10%; }

        h1 { font-size: 3rem; margin-bottom: 2rem; text-align: center;}
        .highlight { color: var(--accent); }

        /* THE VIDEO GRID */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .video-item {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: 0.3s;
        }

        .video-item:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        /* Controls the look of the player */
        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            display: block;
        }

        .video-info { padding: 1.2rem; }
        .video-info h3 { margin-bottom: 0.5rem; font-size: 1.2rem; }
        .video-info p { color: var(--text-dim); font-size: 0.9rem; }

        footer { text-align: center; padding: 4rem 0; color: var(--text-dim); }

        @media (max-width: 600px) {
            .video-grid { grid-template-columns: 1fr; }
            .section { padding: 6rem 5%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><a href="index.html">← Back to Home</a></div>
    </nav>

    <main class="section">
        <h1>My Video <span class="highlight">Projects</span></h1>

        <div class="video-grid">
            
            <!-- VIDEO 1 -->
            <div class="video-item">
                <video controls>
                    <!-- Replace 'video1.mp4' with your actual file name -->
                    <source src="video1.mp4.mov" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="video-info">
                    <h3>Project Name 1</h3>
                    <p>Edited in DaVinci Resolve. Aggressive transitions and sync with music.</p>
                </div>
            </div>

            <!-- VIDEO 2 -->
            <div class="video-item">
                <video controls>
                    <!-- Replace 'video2.mp4' with your actual file name -->
                    <source src="video2.mp4.mov" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="video-info">
                    <h3>Project Name 2</h3>
                    <p>Fast-paced social media edit created in Capcut.</p>
                </div>
            </div>

            <!-- VIDEO 3 -->
            <div class="video-item">
                <video controls>
                    <!-- Replace 'video3.mp4' with your actual file name -->
                    <source src="video3.mp4.mov" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="video-info">
                    <h3>Project Name 3</h3>
                    <p>Masking and compositing techniques used.</p>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 Manthan Ghogare</p>
    </footer>

</body>
</html>
