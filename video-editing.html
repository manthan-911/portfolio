<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Portfolio | Local Files</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #f59e0b; 
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --padding-desktop: 8rem 10% 5rem 10%;
            --padding-mobile: 6rem 5% 3rem 5%;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            position: fixed;
            width: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid #334155;
            height: 60px;
        }

        nav a { 
            color: var(--text); 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        nav a:hover { color: var(--accent); }

        .section { padding: var(--padding-desktop); }

        h1 { 
            font-size: clamp(2rem, 6vw, 3rem); 
            margin-bottom: 2.5rem; 
            text-align: center;
            line-height: 1.2;
        }
        .highlight { color: var(--accent); }

        /* THE VIDEO GRID */
        .video-grid {
            display: grid;
            /* Changed from 350px to 280px to safely fit narrow screens */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .video-item {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: border-color 0.3s, box-shadow 0.3s;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Responsive touch interactions instead of complex transforms */
        @media (hover: hover) {
            .video-item:hover {
                border-color: var(--accent);
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            }
        }

        /* Controls the look of the player */
        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            display: block;
            border-bottom: 1px solid #334155;
        }

        .video-info { 
            padding: 1.2rem; 
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .video-info h3 { margin-bottom: 0.5rem; font-size: 1.15rem; font-weight: 700; }
        .video-info p { color: var(--text-dim); font-size: 0.9rem; }

        footer { text-align: center; padding: 4rem 1rem; color: var(--text-dim); font-size: 0.9rem; }

        /* MOBILE RESPONSIVE LAYOUT */
        @media (max-width: 600px) {
            .section { padding: var(--padding-mobile); }
            .video-grid { 
                grid-template-columns: 1fr; 
                gap: 1.5rem; /* Slightly tighter spacing on small screens */
            }
            .video-info { padding: 1rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><a href="index.html">← Back to Home</a></div>
    </nav>

    <main class="section">
        <h1>My Video <span class="highlight">Projects</span></h1>

        <div class="video-grid">
            
            <!-- VIDEO 1 -->
            <div class="video-item">
                <video controls preload="metadata" playsinline>
                    <!-- Cleaned up file extension structure -->
                    <source src="video1.mp4" type="video/mp4">
                    <source src="video1.mov" type="video/quicktime">
                    Your browser does not support the video tag.
                </video>
                <div class="video-info">
                    <h3>Project Name 1</h3>
                    <p>Edited in DaVinci Resolve. Aggressive transitions and sync with music.</p>
                </div>
            </div>

            <!-- VIDEO 2 -->
            <div class="video-item">
                <video controls preload="metadata" playsinline>
                    <source src="video2.mp4" type="video/mp4">
                    <source src="video2.mov" type="video/quicktime">
                    Your browser does not support the video tag.
                </video>
                <div class="video-info">
                    <h3>Project Name 2</h3>
                    <p>Fast-paced social media edit created in Capcut.</p>
                </div>
            </div>

            <!-- VIDEO 3 -->
            <div class="video-item">
                <video controls preload="metadata" playsinline>
                    <source src="video3.mp4" type="video/mp4">
                    <source src="video3.mov" type="video/quicktime">
                    Your browser does not support the video tag.
                </video>
                <div class="video-info">
                    <h3>Project Name 3</h3>
                    <p>Masking and compositing techniques used.</p>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 Manthan Ghogare</p>
    </footer>

</body>
</html>
